<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOREX SYNC - Consistency Checker</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #050505;
  color: white;
  display: flex;
  justify-content: center;
}

.container {
  width: 380px;
  padding: 20px;
}

h1 {
  text-align: center;
}

.highlight {
  color: #00ff88;
}

.subtitle {
  text-align: center;
  font-size: 12px;
  color: #aaa;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  background: #121212;
  border: 1px solid #222;
  border-radius: 8px;
  color: white;
}

input:focus {
  border-color: #00ff88;
  outline: none;
}

button {
  width: 100%;
  padding: 14px;
  background: linear-gradient(45deg, #00ff88, #00cc66);
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  transform: scale(1.03);
}

.card {
  background: #101010;
  padding: 18px;
  margin-top: 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,255,136,0.1);
}

.row {
  display: flex;
  justify-content: space-between;
  margin: 10px 0;
}

.result {
  color: #00ff88;
  font-weight: bold;
}

.safe {
  color: #00ff88;
}

.risk {
  color: #ff4d4d;
}

.copy-btn {
  margin-top: 10px;
  background: #1a1a1a;
}

.socials {
  display: flex;
  justify-content: space-around;
  margin-top: 25px;
}

.socials a {
  text-decoration: none;
  color: #00ff88;
  font-size: 14px;
  transition: 0.3s;
}

.socials a:hover {
  color: white;
}

.footer {
  text-align: center;
  margin-top: 15px;
  font-size: 12px;
  color: #666;
}
</style>
</head>

<body>

<div class="container">

<h1>Consistency Score <span class="highlight">Checker</span></h1>
<p class="subtitle">FOREX SYNC TOOL</p>

<input id="best" placeholder="Best Trading Day Profit">
<input id="total" placeholder="Total Profit">
<input id="target" placeholder="Target Consistency %">

<button onclick="calculate()">Calculate</button>

<div class="card">
  <div class="row">
    <span>Current Score</span>
    <span id="score" class="result">0%</span>
  </div>

  <div class="row">
    <span>Target</span>
    <span id="targetShow">0%</span>
  </div>

  <div class="row">
    <span>Status</span>
    <span id="status"></span>
  </div>
</div>

<div class="card">
  <div class="row">
    <span>Required Total</span>
    <span id="required" class="result">$0</span>
  </div>

  <div class="row">
    <span>Extra Needed</span>
    <span id="additional" class="result">$0</span>
  </div>

  <button class="copy-btn" onclick="copyResult()">Copy Result</button>
</div>

<!-- SOCIAL LINKS -->
<div class="socials">
  <a href="https://instagram.com/forex_sync/" target="_blank">Instagram</a>
  <a href="https://discord.gg/YOURLINK" target="_blank">Discord</a>
  <a href="https://t.me/forexsync_tele" target="_blank">Telegram</a>
</div>

<div class="footer">
FOREX SYNC © 2026
</div>

</div>

<script>
function calculate() {
  let best = parseFloat(document.getElementById("best").value);
  let total = parseFloat(document.getElementById("total").value);
  let target = parseFloat(document.getElementById("target").value);

  if (!best || !total || !target) {
    alert("Fill all fields");
    return;
  }

  let consistency = (best / total) * 100;
  let requiredTotal = best / (target / 100);
  let additional = requiredTotal - total;

  document.getElementById("score").innerText = consistency.toFixed(2) + "%";
  document.getElementById("targetShow").innerText = target + "%";
  document.getElementById("required").innerText = "$" + requiredTotal.toFixed(2);
  document.getElementById("additional").innerText = "$" + additional.toFixed(2);

  let status = document.getElementById("status");

  if (consistency <= target) {
    status.innerText = "SAFE";
    status.className = "safe";
  } else {
    status.innerText = "AT RISK";
    status.className = "risk";
  }
}

function copyResult() {
  let text = `
Consistency: ${document.getElementById("score").innerText}
Required Total: ${document.getElementById("required").innerText}
Extra Needed: ${document.getElementById("additional").innerText}
  `;
  
  navigator.clipboard.writeText(text);
  alert("Copied!");
}
</script>

</body>
</html>
